[translator]

# ── AHM64 side ──────────────────────────────────────────────────────────────
# IP address this service listens on.
# 0.0.0.0 = all interfaces (recommended for Pi with a single wired port).
ahm_listen_host = 0.0.0.0

# TCP port the AHM64 connects to.
# Point the AHM Device Control "Address" to this Pi's IP and this port.
ahm_listen_port = 8023

# ── SW42DA side ─────────────────────────────────────────────────────────────
# IP address of the Blustream SW42DA on your network.
sw42da_host = 192.168.1.100

# Telnet port of the SW42DA (default is 23; check NET TN in the SW42DA settings).
sw42da_port = 23

# Seconds to wait before retrying a dropped SW42DA connection.
sw42da_reconnect_delay = 5

# Seconds to wait for a SW42DA command response before giving up.
sw42da_command_timeout = 6

# ── Performance ─────────────────────────────────────────────────────────────
# The AHM polls every few seconds.  To avoid hammering the SW42DA with STATUS
# commands, responses are cached for this many seconds.
# Set to 0 to always fetch a fresh STATUS (not recommended).
status_cache_seconds = 3

# ── Logging ─────────────────────────────────────────────────────────────────
# Log level: DEBUG, INFO, WARNING, ERROR
log_level = INFO

# Optional path to a log file.  Leave blank to log to stdout only.
# Example: log_file = /var/log/ahm-translator.log
log_file =
